<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SCHEMING Loading</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,
body{
    width:100%;
    height:100%;
    overflow:hidden;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    background:#050505;
    position: relative;
}

/* Минималистичный цифровой фон */
body::before {
    content: "";
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: 
        radial-gradient(circle at center, transparent 20%, #050505 80%),
        linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 36, 0.01), rgba(0, 0, 255, 0.03));
    background-size: 100% 100%, 100% 4px, 6px 100%;
    z-index: 1;
    pointer-events: none;
}

/* Кнопка Мута (Вкл/Выкл звук) */
.mute-btn {
    position: absolute;
    top: 30px;
    right: 30px;
    background: none;
    border: none;
    color: #555;
    cursor: pointer;
    z-index: 10;
    transition: color 0.3s, transform 0.2s;
}

.mute-btn:hover {
    color: #fff;
    transform: scale(1.1);
}

.mute-btn svg {
    width: 28px;
    height: 28px;
    fill: currentColor;
}

/* Контейнер для центральных элементов */
.main-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 30px;
    z-index: 2;
}

/* Текст с глитчем */
.logo {
    position:relative;
    font-size:clamp(60px,10vw,160px);
    font-weight:900;
    font-style:italic;
    letter-spacing:10px;
    color:#fff;
    text-transform: uppercase;
    animation: logoGlow 4s ease-in-out infinite;
}

.logo::before,
.logo::after {
    content: "SCHEMING";
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: #050505;
}

.logo::before {
    left: 2px;
    text-shadow: -2px 0 #ff003c;
    clip: rect(44px, 450px, 56px, 0);
    animation: glitch-anim 5s infinite linear alternate-reverse;
}

.logo::after {
    left: -2px;
    text-shadow: -2px 0 #00e6ff, 0 2px #33ff00;
    clip: rect(85px, 450px, 140px, 0);
    animation: glitch-anim2 5s infinite linear alternate-reverse;
}

/* Эквалайзер (Симметричный, как на 2-ом примере из картинки) */
.equalizer-container {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 4px;
    height: 60px;
    width: 300px;
}

.bar {
    width: 6px;
    height: 6px; /* Минимальная высота, когда звука нет */
    background: linear-gradient(to top, #00e6ff, #0088ff);
    border-radius: 3px;
    transition: height 0.05s ease;
}

/* Анимации */
@keyframes logoGlow{
    0%,100%{ transform:scale(1); text-shadow: 0 0 8px rgba(255,255,255,.2); }
    50%{ transform:scale(1.02); text-shadow: 0 0 15px rgba(255,255,255,.6), 0 0 40px rgba(255,255,255,.2); }
}

@keyframes glitch-anim {
  0% { clip: rect(31px, 9999px, 94px, 0); transform: skew(0.3deg); }
  5% { clip: rect(112px, 9999px, 76px, 0); transform: skew(0.5deg); }
  10% { clip: rect(85px, 9999px, 5px, 0); transform: skew(-0.2deg); }
  15% { clip: rect(27px, 9999px, 115px, 0); transform: skew(0.8deg); }
  20% { clip: rect(63px, 9999px, 132px, 0); transform: skew(-0.5deg); }
  25% { clip: rect(0px, 0px, 0px, 0px); transform: skew(0deg); }
  100% { clip: rect(0px, 0px, 0px, 0px); transform: skew(0deg); }
}

@keyframes glitch-anim2 {
  0% { clip: rect(76px, 9999px, 116px, 0); transform: skew(-0.5deg); }
  5% { clip: rect(23px, 9999px, 95px, 0); transform: skew(0.2deg); }
  10% { clip: rect(122px, 9999px, 140px, 0); transform: skew(0.7deg); }
  15% { clip: rect(4px, 9999px, 45px, 0); transform: skew(-0.8deg); }
  20% { clip: rect(0px, 0px, 0px, 0px); transform: skew(0deg); }
  100% { clip: rect(0px, 0px, 0px, 0px); transform: skew(0deg); }
}

.loading{
    position:absolute;
    bottom:60px;
    z-index: 2;
    color:#555;
    font-size:14px;
    letter-spacing:6px;
    text-transform:uppercase;
    animation:pulse 2s infinite ease-in-out;
}

@keyframes pulse{
    0%,100%{ opacity:.4; }
    50%{ opacity:1; color: #aaa; }
}
</style>
</head>

<body>

<button class="mute-btn" id="muteBtn" title="Включить/Выключить звук">
    <svg id="muteIcon" viewBox="0 0 24 24">
        <path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77zM3 9v6h4l5 5V4L7 9H3z"/>
    </svg>
</button>

<div class="main-container">
    <div class="logo">SCHEMING</div>
    
    <div class="equalizer-container" id="equalizer"></div>
</div>

<div class="loading">LOADING...</div>

<audio id="bgMusic" loop crossorigin="anonymous">
    <source src="sound.mp3" type="audio/mpeg">
</audio>

<script>
const music = document.getElementById('bgMusic');
const muteBtn = document.getElementById('muteBtn');
const muteIcon = document.getElementById('muteIcon');
const equalizerContainer = document.getElementById('equalizer');

music.volume = 0.20;

// Создаем 32 полоски для эквалайзера
const BAR_COUNT = 32;
const bars = [];
for (let i = 0; i < BAR_COUNT; i++) {
    const bar = document.createElement('div');
    bar.classList.add('bar');
    equalizerContainer.appendChild(bar);
    bars.push(bar);
}

let audioCtx, analyser, dataArray;
let isAudioInitialized = false;

// Инициализация аудио-анализатора (запускается только после действия пользователя)
function initAudioAnalyser() {
    if (isAudioInitialized) return;
    
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const source = audioCtx.createMediaElementSource(music);
    analyser = audioCtx.createAnalyser();
    
    source.connect(analyser);
    analyser.connect(audioCtx.destination);
    
    analyser.fftSize = 64; // Количество частот (из них берем нужные нам 32)
    const bufferLength = analyser.frequencyBinCount;
    dataArray = new Uint8Array(bufferLength);
    
    isAudioInitialized = true;
    animateEqualizer();
}

// Функция анимации полосок
function animateEqualizer() {
    requestAnimationFrame(animateEqualizer);
    if (!isAudioInitialized || music.paused) {
        // Если музыка стоит на паузе, плавно опускаем полоски
        bars.forEach(bar => bar.style.height = '6px');
        return;
    }
    
    analyser.getByteFrequencyData(dataArray);
    
    for (let i = 0; i < BAR_COUNT; i++) {
        // Берем значение частоты (от 0 до 255)
        let value = dataArray[i] || 0;
        // Переводим в пиксели для высоты (макс 60px)
        let height = (value / 255) * 54 + 6; 
        bars[i].style.height = `${height}px`;
    }
}

// Иконки для кнопки (Mute / Unmute)
const iconSoundOn = '<path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>';
const iconSoundOff = '<path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.21.05-.42.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/>';

// Логика кнопки переключения звука
muteBtn.addEventListener('click', () => {
    // Включаем AudioContext, если он еще не запущен
    if (!isAudioInitialized) {
        initAudioAnalyser();
    }
    if (audioCtx && audioCtx.state === 'suspended') {
        audioCtx.resume();
    }

    if (music.paused) {
        music.play().then(() => {
            muteIcon.innerHTML = iconSoundOn;
        }).catch(err => console.log("Ошибка воспроизведения:", err));
    } else {
        music.pause();
        muteIcon.innerHTML = iconSoundOff;
    }
});

// Бесшовный перезапуск музыки
music.onended = function() {
    music.currentTime = 0;
    music.play().catch(error => console.log("Перезапуск заблокирован"));
};

// Текст загрузки (точки)
const loading = document.querySelector('.loading');
let dots = 0;
setInterval(() => {
    dots = (dots + 1) % 4;
    loading.textContent = 'LOADING' + '.'.repeat(dots);
}, 500);
</script>

</body>
</html>
