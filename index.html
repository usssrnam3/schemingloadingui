<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SCHEMING Loading</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,
body{
    width:100%;
    height:100%;
    overflow:hidden;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    background:#050505;
    position: relative;
}

/* Минималистичный цифровой фон (эффект сетки и шума) */
body::before {
    content: "";
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: 
        radial-gradient(circle at center, transparent 20%, #050505 80%),
        linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 36, 0.01), rgba(0, 0, 255, 0.03));
    background-size: 100% 100%, 100% 4px, 6px 100%;
    z-index: 1;
    pointer-events: none;
}

/* Кнопка Мута с яркой неоновой подсветкой */
.mute-btn {
    position: absolute;
    top: 30px;
    right: 30px;
    background: rgba(255, 255, 255, 0.03);
    border: 1px solid rgba(255, 255, 255, 0.15);
    border-radius: 50%;
    width: 50px;
    height: 50px;
    display: flex;
    justify-content: center;
    align-items: center;
    color: #fff; 
    cursor: pointer;
    z-index: 10;
    transition: all 0.3s ease;
    
    /* Мягкое белое свечение вокруг кнопки */
    box-shadow: 0 0 15px rgba(255, 255, 255, 0.1), inset 0 0 10px rgba(255, 255, 255, 0.05);
}

.mute-btn:hover { 
    background: rgba(255, 255, 255, 0.1);
    border-color: rgba(255, 255, 255, 0.6);
    transform: scale(1.05);
    /* Усиление подсветки при наведении */
    box-shadow: 0 0 20px rgba(255, 255, 255, 0.4), inset 0 0 10px rgba(255, 255, 255, 0.2);
}

.mute-btn svg { 
    width: 24px; 
    height: 24px; 
    fill: currentColor; 
    /* Дополнительное свечение самой иконки */
    filter: drop-shadow(0 0 4px rgba(255, 255, 255, 0.6));
}

/* Главный контейнер */
.main-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 30px;
    z-index: 2;
}

/* Текст SCHEMING с глитчем */
.logo {
    position:relative;
    font-size:clamp(60px,10vw,160px);
    font-weight:900;
    font-style:italic;
    letter-spacing:10px;
    color:#fff;
    text-transform: uppercase;
    animation: logoGlow 4s ease-in-out infinite;
    user-select: none;
}

.logo::before, .logo::after {
    content: "SCHEMING";
    position: absolute; 
    top: 0; 
    left: 0; 
    width: 100%; 
    height: 100%; 
    background: #050505;
}

.logo::before {
    left: 2px; 
    text-shadow: -2px 0 #ff003c; 
    clip: rect(44px, 450px, 56px, 0);
    animation: glitch-anim 5s infinite linear alternate-reverse;
}

.logo::after {
    left: -2px; 
    text-shadow: -2px 0 #00e6ff, 0 2px #33ff00; 
    clip: rect(85px, 450px, 140px, 0);
    animation: glitch-anim2 5s infinite linear alternate-reverse;
}

/* Белый эквалайзер с автономной CSS анимацией */
.equalizer-container {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 4px;
    height: 60px;
    width: 300px;
}

.bar {
    width: 6px;
    height: 6px;
    background: #ffffff;
    border-radius: 3px;
    box-shadow: 0 0 10px rgba(255, 255, 255, 0.4);
    
    /* Запуск прыжков сразу при старте без задержек */
    animation: bounce 1.2s ease-in-out infinite alternate;
}

/* Разная скорость и задержка анимации для эффекта хаотичности частот */
.bar:nth-child(2n) { animation-delay: 0.2s; animation-duration: 0.8s; }
.bar:nth-child(3n) { animation-delay: 0.4s; animation-duration: 1.1s; }
.bar:nth-child(4n) { animation-delay: 0.1s; animation-duration: 0.9s; }
.bar:nth-child(5n) { animation-delay: 0.6s; animation-duration: 1.3s; }

@keyframes bounce {
    0% { height: 6px; }
    100% { height: 52px; }
}

/* Анимации глитча и пульсации */
@keyframes logoGlow{
    0%,100%{ transform:scale(1); text-shadow: 0 0 8px rgba(255,255,255,.15); }
    50%{ transform:scale(1.04); text-shadow: 0 0 15px rgba(255,255,255,.65), 0 0 35px rgba(255,255,255,.45); }
}

@keyframes glitch-anim {
  0% { clip: rect(31px, 9999px, 94px, 0); transform: skew(0.3deg); }
  5% { clip: rect(112px, 9999px, 76px, 0); transform: skew(0.5deg); }
  25% { clip: rect(0px, 0px, 0px, 0px); transform: skew(0deg); }
  100% { clip: rect(0px, 0px, 0px, 0px); transform: skew(0deg); }
}

@keyframes glitch-anim2 {
  0% { clip: rect(76px, 9999px, 116px, 0); transform: skew(-0.5deg); }
  20% { clip: rect(0px, 0px, 0px, 0px); transform: skew(0deg); }
  100% { clip: rect(0px, 0px, 0px, 0px); transform: skew(0deg); }
}

.loading{
    position:absolute; 
    bottom:60px; 
    z-index: 2; 
    color:#777; 
    font-size:14px;
    letter-spacing:6px; 
    text-transform:uppercase; 
    animation:pulse 2s infinite ease-in-out; 
    user-select: none;
}

@keyframes pulse{ 0%,100%{ opacity:.3; } 50%{ opacity:1; } }
</style>
</head>

<body>

<button class="mute-btn" id="muteBtn" title="Включить/Выключить звук">
    <svg id="muteIcon" viewBox="0 0 24 24">
        <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>
    </svg>
</button>

<div class="main-container">
    <div class="logo">SCHEMING</div>
    <div class="equalizer-container" id="equalizer"></div>
</div>

<div class="loading">LOADING...</div>

<audio id="bgMusic" autoplay loop crossorigin="anonymous"></audio>

<script>
const music = document.getElementById('bgMusic');
const muteBtn = document.getElementById('muteBtn');
const muteIcon = document.getElementById('muteIcon');
const equalizerContainer = document.getElementById('equalizer');

music.volume = 0.20;

// Обход кэша: принудительно заставляем браузер загрузить новый файл sound.mp3
music.src = 'sound.mp3?t=' + new Date().getTime();

// Автоматическая генерация 32 полосок для эквалайзера
for (let i = 0; i < 32; i++) {
    const bar = document.createElement('div');
    bar.classList.add('bar');
    equalizerContainer.appendChild(bar);
}

const iconSoundOn = '<path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>';
const iconSoundOff = '<path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.21.05-.42.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/>';

// Попытка принудительно запустить звук сразу при загрузке DOM
document.addEventListener("DOMContentLoaded", () => {
    music.play().then(() => {
        muteIcon.innerHTML = iconSoundOn;
    }).catch(() => {
        console.log("Автоплей ограничен движком, звук активируется по первому клику.");
        muteIcon.innerHTML = iconSoundOff;
    });
});

// Глобальная функция-активатор звука
function handleGlobalClick() {
    if (music.paused) {
        music.play().then(() => { 
            muteIcon.innerHTML = iconSoundOn; 
        }).catch(e => console.log(e));
    }
    document.body.removeEventListener('click', handleGlobalClick);
}

// Слушаем первый клик по экрану для обхода ограничений автоплея
document.body.addEventListener('click', handleGlobalClick);

// Логика работы кнопки Мута (Вкл/Выкл)
muteBtn.addEventListener('click', (e) => {
    e.stopPropagation(); // Отключаем всплытие, чтобы не конфликтовать с кликом по body
    
    // Снимаем глобальный клик, так как пользователь уже кликнул по интерфейсу целенаправленно
    document.body.removeEventListener('click', handleGlobalClick);

    if (music.paused) {
        music.play().then(() => { 
            muteIcon.innerHTML = iconSoundOn; 
        }).catch(err => console.log(err));
    } else {
        music.pause();
        muteIcon.innerHTML = iconSoundOff;
    }
});

// Бесшовный принудительный перезапуск трека в конце
music.onended = () => { 
    music.currentTime = 0; 
    music.play().catch(err => console.log("Ошибка автозацикливания")); 
};

// Скрипт точек LOADING...
const loadingEl = document.querySelector('.loading');
let dots = 0;
setInterval(() => {
    dots = (dots + 1) % 4;
    loadingEl.textContent = 'LOADING' + '.'.repeat(dots);
}, 500);
</script>

</body>
</html>
