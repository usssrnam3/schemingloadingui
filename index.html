<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SCHEMING Loading v3</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,
body{
    width:100%;
    height:100%;
    overflow:hidden;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    background:#050505;
    position: relative;
}

body::before {
    content: "";
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background:
        radial-gradient(circle at center, transparent 18%, #050505 78%),
        linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.28) 50%),
        linear-gradient(90deg, rgba(255, 0, 60, 0.035), rgba(0, 255, 36, 0.015), rgba(0, 230, 255, 0.035));
    background-size: 100% 100%, 100% 4px, 6px 100%;
    z-index: 1;
    pointer-events: none;
    animation: scanMove 8s linear infinite;
}

body::after {
    content:"";
    position:absolute;
    inset:-20%;
    z-index:1;
    pointer-events:none;
    background:
        radial-gradient(circle at 20% 30%, rgba(255,255,255,.04), transparent 18%),
        radial-gradient(circle at 80% 70%, rgba(0,230,255,.035), transparent 22%),
        radial-gradient(circle at 50% 50%, rgba(255,0,60,.025), transparent 25%);
    filter: blur(18px);
    animation: ambientDrift 12s ease-in-out infinite alternate;
}

@keyframes scanMove {
    0% { background-position: 0 0, 0 0, 0 0; }
    100% { background-position: 0 0, 0 60px, 36px 0; }
}

@keyframes ambientDrift {
    0% { transform: translate(-2%, -2%) scale(1); opacity:.65; }
    100% { transform: translate(2%, 3%) scale(1.08); opacity:1; }
}

.mute-btn {
    position: fixed;
    top: 30px;
    right: 30px;
    background: rgba(255, 255, 255, 0.03);
    border: 1px solid rgba(255, 255, 255, 0.15);
    border-radius: 50%;
    width: 50px;
    height: 50px;
    display: flex;
    justify-content: center;
    align-items: center;
    color: #fff;
    cursor: pointer;
    z-index: 9999;
    pointer-events: auto !important;
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
    transition: all 0.3s ease;
    box-shadow: 0 0 15px rgba(255, 255, 255, 0.1), inset 0 0 10px rgba(255, 255, 255, 0.05);
}

.mute-btn:hover {
    background: rgba(255, 255, 255, 0.1);
    border-color: rgba(255, 255, 255, 0.6);
    transform: scale(1.05) rotate(4deg);
    box-shadow: 0 0 24px rgba(255, 255, 255, 0.45), inset 0 0 12px rgba(255, 255, 255, 0.22);
}

.mute-btn svg {
    width: 24px;
    height: 24px;
    fill: currentColor;
    filter: drop-shadow(0 0 4px rgba(255, 255, 255, 0.6));
}

.main-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 30px;
    z-index: 5;
}

.logo {
    position:relative;
    font-size:clamp(60px,10vw,160px);
    font-weight:900;
    font-style:italic;
    letter-spacing:10px;
    color:#fff;
    text-transform: uppercase;
    animation: logoGlow 4s ease-in-out infinite, logoFloat 6s ease-in-out infinite;
    user-select: none;
    text-shadow: 0 0 10px rgba(255,255,255,.25);
}

.logo::before, .logo::after {
    content: attr(data-text);
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: #050505;
    overflow:hidden;
}

.logo::before {
    left: 2px;
    text-shadow: -2px 0 #ff003c, 0 0 16px rgba(255,0,60,.5);
    clip: rect(44px, 450px, 56px, 0);
    animation: glitch-anim 4.5s infinite linear alternate-reverse;
}

.logo::after {
    left: -2px;
    text-shadow: -2px 0 #00e6ff, 0 2px #33ff00, 0 0 16px rgba(0,230,255,.45);
    clip: rect(85px, 450px, 140px, 0);
    animation: glitch-anim2 5.2s infinite linear alternate-reverse;
}

.equalizer-container {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 4px;
    height: 64px;
    width: 300px;
    filter: drop-shadow(0 0 10px rgba(255,255,255,.18));
}

.bar {
    width: 6px;
    height: 6px;
    background: #ffffff;
    border-radius: 3px;
    box-shadow: 0 0 12px rgba(255, 255, 255, 0.45);
    animation: bounce 1.15s cubic-bezier(.45,0,.25,1.5) infinite alternate;
}

.bar:nth-child(2n) { animation-delay: 0.18s; animation-duration: 0.8s; }
.bar:nth-child(3n) { animation-delay: 0.34s; animation-duration: 1.08s; }
.bar:nth-child(4n) { animation-delay: 0.08s; animation-duration: 0.9s; }
.bar:nth-child(5n) { animation-delay: 0.52s; animation-duration: 1.3s; }
.bar:nth-child(7n) { animation-delay: 0.12s; animation-duration: 0.65s; }

@keyframes bounce {
    0% { height: 6px; opacity: .45; transform: translateY(8px); }
    45% { opacity: 1; }
    100% { height: 56px; opacity: .95; transform: translateY(-4px); }
}

@keyframes logoFloat {
    0%,100% { transform: translateY(0) scale(1); }
    50% { transform: translateY(-8px) scale(1.035); }
}

@keyframes logoGlow{
    0%,100%{ text-shadow: 0 0 8px rgba(255,255,255,.15); }
    50%{ text-shadow: 0 0 15px rgba(255,255,255,.65), 0 0 35px rgba(255,255,255,.45); }
}

@keyframes glitch-anim {
  0% { clip: rect(31px, 9999px, 94px, 0); transform: skew(0.3deg) translateX(0); }
  4% { clip: rect(112px, 9999px, 76px, 0); transform: skew(0.5deg) translateX(4px); }
  8% { clip: rect(22px, 9999px, 48px, 0); transform: skew(-0.4deg) translateX(-3px); }
  14% { clip: rect(70px, 9999px, 122px, 0); transform: skew(0.8deg) translateX(2px); }
  22%,100% { clip: rect(0px, 0px, 0px, 0px); transform: skew(0deg); }
}

@keyframes glitch-anim2 {
  0% { clip: rect(76px, 9999px, 116px, 0); transform: skew(-0.5deg) translateX(0); }
  6% { clip: rect(20px, 9999px, 64px, 0); transform: skew(0.7deg) translateX(-5px); }
  13% { clip: rect(98px, 9999px, 138px, 0); transform: skew(-0.9deg) translateX(3px); }
  20%,100% { clip: rect(0px, 0px, 0px, 0px); transform: skew(0deg); }
}

.loading{
    position:absolute;
    bottom:60px;
    z-index: 5;
    color:#777;
    font-size:14px;
    letter-spacing:6px;
    text-transform:uppercase;
    animation:pulse 2s infinite ease-in-out;
    user-select: none;
}

@keyframes pulse{
    0%,100%{ opacity:.3; filter: blur(.2px); }
    50%{ opacity:1; filter: blur(0); }
}

.aura-text {
    position: absolute;
    z-index: 3;
    color: rgba(255,255,255,.08);
    font-size: clamp(22px, 4vw, 70px);
    font-weight: 900;
    font-style: italic;
    letter-spacing: 4px;
    text-transform: lowercase;
    pointer-events: none;
    user-select: none;
    opacity: 0;
    white-space: nowrap;
    text-shadow:
        2px 0 rgba(255,0,60,.25),
        -2px 0 rgba(0,230,255,.25),
        0 0 25px rgba(255,255,255,.12);
}

.aura-text.soft {
    animation: auraSoft 3.4s ease-in-out forwards;
}

.aura-text.full {
    z-index: 25;
    left: 50% !important;
    top: 50% !important;
    font-size: clamp(55px, 12vw, 190px);
    color: rgba(255,255,255,.92);
    animation: auraFullGlitch .58s steps(2, end) forwards;
}

.aura-text.full::before,
.aura-text.full::after {
    content: attr(data-text);
    position:absolute;
    inset:0;
    pointer-events:none;
}

.aura-text.full::before {
    color:#ff003c;
    transform:translateX(-10px);
    clip-path: inset(0 0 55% 0);
}

.aura-text.full::after {
    color:#00e6ff;
    transform:translateX(10px);
    clip-path: inset(45% 0 0 0);
}

@keyframes auraSoft {
    0% {
        opacity: 0;
        transform: translate(-50%, -50%) scale(.92) skew(0deg);
        filter: blur(8px);
    }
    20% {
        opacity: .18;
        filter: blur(1px);
    }
    75% {
        opacity: .12;
    }
    100% {
        opacity: 0;
        transform: translate(-50%, -50%) scale(1.08) skew(-2deg);
        filter: blur(10px);
    }
}

@keyframes auraFullGlitch {
    0% {
        opacity: 0;
        transform: translate(-50%, -50%) scale(.4) skew(15deg);
        filter: blur(12px);
    }
    18% {
        opacity: 1;
        transform: translate(-48%, -52%) scale(1.25) skew(-8deg);
        filter: blur(0);
    }
    32% {
        transform: translate(-52%, -48%) scale(1.4) skew(10deg);
        text-shadow:
            -8px 0 #ff003c,
            8px 0 #00e6ff,
            0 0 50px #fff;
    }
    55% {
        transform: translate(-50%, -50%) scale(1.15) skew(-3deg);
    }
    75% {
        opacity: 1;
        transform: translate(-50%, -50%) scale(1.6);
    }
    100% {
        opacity: 0;
        transform: translate(-50%, -50%) scale(2.2);
        filter: blur(18px);
    }
}

.screen-flash {
    position:absolute;
    inset:0;
    z-index:24;
    pointer-events:none;
    opacity:0;
    background:rgba(255,255,255,.08);
}

.screen-flash.active {
    animation: flashHit .35s steps(2, end) forwards;
}

@keyframes flashHit {
    0% { opacity:0; }
    20% { opacity:.5; }
    45% { opacity:0; }
    65% { opacity:.25; }
    100% { opacity:0; }
}

.vibe-canvas {
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    z-index:2;
    pointer-events:none;
    opacity:.72;
    mix-blend-mode:screen;
}

.depth-fog {
    position:absolute;
    inset:-15%;
    z-index:2;
    pointer-events:none;
    background:
        conic-gradient(from 180deg at 50% 50%, transparent, rgba(255,255,255,.035), transparent, rgba(0,230,255,.045), transparent, rgba(255,0,60,.035), transparent),
        radial-gradient(circle at 50% 48%, rgba(255,255,255,.06), transparent 24%, rgba(0,0,0,.15) 54%, rgba(0,0,0,.72) 100%);
    filter: blur(10px);
    animation: fogSpin 18s linear infinite, fogPulse 6s ease-in-out infinite;
}

@keyframes fogSpin {
    0% { transform: rotate(0deg) scale(1); }
    100% { transform: rotate(360deg) scale(1); }
}

@keyframes fogPulse {
    0%,100% { opacity:.45; }
    50% { opacity:.82; }
}

.digital-rain {
    position:absolute;
    inset:0;
    z-index:3;
    pointer-events:none;
    overflow:hidden;
}

.rune {
    position:absolute;
    color:rgba(255,255,255,.14);
    font-size:12px;
    font-weight:900;
    letter-spacing:2px;
    text-shadow:0 0 10px rgba(255,255,255,.2), 2px 0 rgba(255,0,60,.15), -2px 0 rgba(0,230,255,.15);
    animation:runeFall linear forwards;
    white-space:nowrap;
}

@keyframes runeFall {
    0% { opacity:0; transform:translateY(-20px) skewX(8deg); filter:blur(4px); }
    12% { opacity:.75; filter:blur(0); }
    85% { opacity:.2; }
    100% { opacity:0; transform:translateY(120vh) skewX(-10deg); filter:blur(6px); }
}

.glitch-strip {
    position:absolute;
    left:-10%;
    width:120%;
    height:2px;
    z-index:22;
    pointer-events:none;
    opacity:0;
    background:linear-gradient(90deg, transparent, rgba(255,255,255,.75), rgba(0,230,255,.55), rgba(255,0,60,.55), transparent);
    box-shadow:0 0 18px rgba(255,255,255,.5);
    transform:translateX(-20%);
}

.glitch-strip.active {
    animation:stripSlash .42s steps(3,end) forwards;
}

@keyframes stripSlash {
    0% { opacity:0; transform:translateX(-25%) scaleY(1); }
    15% { opacity:.95; transform:translateX(0) scaleY(8); }
    45% { opacity:.5; transform:translateX(8%) scaleY(2); }
    100% { opacity:0; transform:translateX(25%) scaleY(1); }
}

.logo::marker { display:none; }
.logo {
    filter: drop-shadow(0 22px 32px rgba(0,0,0,.75));
}

.main-container::before {
    content:"";
    position:absolute;
    width:min(80vw, 880px);
    height:min(38vw, 360px);
    border-radius:50%;
    background:radial-gradient(circle, rgba(255,255,255,.08), rgba(0,230,255,.035) 30%, rgba(255,0,60,.025) 48%, transparent 70%);
    filter:blur(22px);
    z-index:-1;
    animation:haloBreath 5s ease-in-out infinite;
}

@keyframes haloBreath {
    0%,100% { opacity:.45; transform:scale(.96); }
    50% { opacity:.9; transform:scale(1.08); }
}


.logo.logo-switching {
    animation: logoSwitchHit .72s steps(3, end), logoSpark .12s linear infinite;
}

.logo.logo-summer {
    text-shadow:
        0 0 16px rgba(255,255,255,.9),
        0 0 32px rgba(255,210,80,.72),
        0 0 70px rgba(255,120,0,.35);
}

.logo.logo-summer::before {
    text-shadow: -3px 0 #ffb000, 0 0 22px rgba(255,185,40,.8);
}

.logo.logo-summer::after {
    text-shadow: 3px 0 #ffffff, -3px 0 #ff4d00, 0 0 22px rgba(255,120,0,.65);
}

.logo.logo-naplyvich {
    letter-spacing: 6px;
    text-shadow:
        -4px 0 rgba(255,0,60,.8),
        4px 0 rgba(0,230,255,.8),
        0 0 42px rgba(255,255,255,.75);
}

@keyframes logoSwitchHit {
    0% { transform: translateY(0) scale(1) skew(0); filter: blur(0); }
    18% { transform: translate(-10px, -4px) scale(1.08) skew(8deg); filter: blur(1px); }
    36% { transform: translate(12px, 3px) scale(.96) skew(-10deg); }
    58% { transform: translate(-4px, 0) scale(1.13) skew(4deg); text-shadow: -12px 0 #ff003c, 12px 0 #00e6ff, 0 0 70px #fff; }
    100% { transform: translateY(0) scale(1) skew(0); filter: blur(0); }
}

@keyframes logoSpark {
    0%,100% { opacity:1; }
    30% { opacity:.35; }
    60% { opacity:1; }
    80% { opacity:.55; }
}

.summer-flare {
    position:absolute;
    inset:0;
    z-index:4;
    pointer-events:none;
    opacity:0;
    background:
        radial-gradient(circle at 50% 45%, rgba(255,210,90,.22), transparent 24%),
        radial-gradient(circle at 50% 50%, rgba(255,255,255,.08), transparent 36%);
}

.summer-flare.active {
    animation: summerFlare 1.2s ease-out forwards;
}

@keyframes summerFlare {
    0% { opacity:0; transform:scale(.8); filter:blur(18px); }
    25% { opacity:1; }
    100% { opacity:0; transform:scale(1.45); filter:blur(34px); }
}

</style>
</head>

<body>

<button class="mute-btn" id="muteBtn" title="Включить/Выключить звук">
    <svg id="muteIcon" viewBox="0 0 24 24">
        <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>
    </svg>
</button>

<div class="screen-flash" id="screenFlash"></div>
<canvas class="vibe-canvas" id="vibeCanvas"></canvas>
<div class="depth-fog"></div>
<div class="digital-rain" id="digitalRain"></div>
<div class="glitch-strip" id="glitchStrip"></div>
<div class="summer-flare" id="summerFlare"></div>

<div class="aura-text" id="auraText">надо пофармить ауру..</div>

<div class="main-container">
    <div class="logo" data-text="SCHEMING">SCHEMING</div>
    <div class="equalizer-container" id="equalizer"></div>
</div>

<div class="loading">LOADING...</div>

<audio id="bgMusic" src="sound.mp3" autoplay loop preload="auto" playsinline></audio>

<script>
const music = document.getElementById('bgMusic');
const muteBtn = document.getElementById('muteBtn');
const muteIcon = document.getElementById('muteIcon');
const equalizerContainer = document.getElementById('equalizer');
const auraText = document.getElementById('auraText');
const screenFlash = document.getElementById('screenFlash');

const MUSIC_VOLUME = 0.045;
let userMuted = false;

music.volume = MUSIC_VOLUME;
music.muted = false;
music.preload = 'auto';
music.autoplay = true;
music.loop = true;
music.setAttribute('playsinline', 'playsinline');
// Файл sound.mp3 должен лежать рядом с HTML.
music.src = 'sound.mp3';
music.load();

const phrases = ['SCHEMING','SUMMER 2026','AURA+100','AURAx0','Z-CITY'];

function getRandomPhrase() {
    return phrases[Math.floor(Math.random() * phrases.length)];
}

function setAuraPhrase() {
    const phrase = getRandomPhrase();
    auraText.textContent = phrase;
    auraText.setAttribute('data-text', phrase);
}

for (let i = 0; i < 32; i++) {
    const bar = document.createElement('div');
    bar.classList.add('bar');
    equalizerContainer.appendChild(bar);
}

const iconSoundOn = '<path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>';
const iconSoundOff = '<path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.21.05-.42.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/>';

function updateMuteIcon() {
    muteIcon.innerHTML = userMuted ? iconSoundOff : iconSoundOn;
    muteBtn.title = userMuted ? 'Включить звук' : 'Выключить звук';
}

function forcePlayMusic() {
    music.volume = MUSIC_VOLUME;
    music.muted = userMuted;

    const playPromise = music.play();
    if (playPromise && typeof playPromise.catch === 'function') {
        playPromise.catch(err => {
            // Если движок Garry's Mod/CEF сам запрещает autoplay, JS не сможет это обойти.
            console.log('Autoplay blocked by engine/browser:', err);
        });
    }
}

function toggleMute(e) {
    if (e) {
        e.preventDefault();
        e.stopPropagation();
    }

    userMuted = !userMuted;
    music.muted = userMuted;

    if (!userMuted) {
        forcePlayMusic();
    }

    updateMuteIcon();
}

// Никакой проверки на первый клик: просто запускаем музыку сразу.
document.addEventListener('DOMContentLoaded', () => {
    updateMuteIcon();
    forcePlayMusic();
});

window.addEventListener('load', () => {
    forcePlayMusic();
});

muteBtn.addEventListener('click', toggleMute);
muteBtn.addEventListener('mousedown', (e) => e.stopPropagation());
muteBtn.addEventListener('touchstart', (e) => e.stopPropagation(), { passive: false });

music.onended = () => {
    music.currentTime = 0;
    tryStartAudio();
};

const loadingEl = document.querySelector('.loading');
let dots = 0;
setInterval(() => {
    dots = (dots + 1) % 4;
    loadingEl.textContent = 'LOADING' + '.'.repeat(dots);
}, 500);

function randomAuraSoft() {
    setAuraPhrase();
    auraText.className = 'aura-text';
    const x = 15 + Math.random() * 70;
    const y = 15 + Math.random() * 70;
    auraText.style.left = x + '%';
    auraText.style.top = y + '%';
    void auraText.offsetWidth;
    auraText.classList.add('soft');
}

function auraFullGlitch() {
    setAuraPhrase();
    auraText.className = 'aura-text';
    auraText.style.left = '50%';
    auraText.style.top = '50%';
    screenFlash.className = 'screen-flash';
    void auraText.offsetWidth;
    void screenFlash.offsetWidth;
    screenFlash.classList.add('active');
    if (typeof microGlitchBurst === 'function') microGlitchBurst();
    auraText.classList.add('full');
}

setInterval(() => {
    if (Math.random() > 0.25) {
        randomAuraSoft();
    } else {
        randomAuraSoft();
        setTimeout(() => {
            auraText.className = 'aura-text';
        }, 900);
        setTimeout(() => {
            auraFullGlitch();
        }, 1150);
    }
}, 4200);


const vibeCanvas = document.getElementById('vibeCanvas');
const vibeCtx = vibeCanvas.getContext('2d');
const digitalRain = document.getElementById('digitalRain');
const glitchStrip = document.getElementById('glitchStrip');
const summerFlare = document.getElementById('summerFlare');
let particles = [];
let sparks = [];

function resizeVibeCanvas() {
    const dpr = Math.min(window.devicePixelRatio || 1, 2);
    vibeCanvas.width = Math.floor(window.innerWidth * dpr);
    vibeCanvas.height = Math.floor(window.innerHeight * dpr);
    vibeCanvas.style.width = window.innerWidth + 'px';
    vibeCanvas.style.height = window.innerHeight + 'px';
    vibeCtx.setTransform(dpr, 0, 0, dpr, 0, 0);

    const amount = Math.min(90, Math.floor(window.innerWidth / 18));
    particles = Array.from({ length: amount }, () => ({
        x: Math.random() * window.innerWidth,
        y: Math.random() * window.innerHeight,
        vx: (Math.random() - 0.5) * 0.28,
        vy: (Math.random() - 0.5) * 0.28,
        r: Math.random() * 1.8 + 0.45,
        a: Math.random() * 0.35 + 0.08
    }));
}

function drawVibe() {
    vibeCtx.clearRect(0, 0, window.innerWidth, window.innerHeight);

    for (const p of particles) {
        p.x += p.vx;
        p.y += p.vy;
        if (p.x < -20) p.x = window.innerWidth + 20;
        if (p.x > window.innerWidth + 20) p.x = -20;
        if (p.y < -20) p.y = window.innerHeight + 20;
        if (p.y > window.innerHeight + 20) p.y = -20;

        vibeCtx.beginPath();
        vibeCtx.fillStyle = `rgba(255,255,255,${p.a})`;
        vibeCtx.shadowBlur = 12;
        vibeCtx.shadowColor = 'rgba(255,255,255,.45)';
        vibeCtx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        vibeCtx.fill();
    }

    vibeCtx.shadowBlur = 0;
    for (let i = 0; i < particles.length; i++) {
        for (let j = i + 1; j < particles.length; j++) {
            const a = particles[i];
            const b = particles[j];
            const dx = a.x - b.x;
            const dy = a.y - b.y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            if (dist < 135) {
                vibeCtx.strokeStyle = `rgba(255,255,255,${(1 - dist / 135) * 0.045})`;
                vibeCtx.lineWidth = 1;
                vibeCtx.beginPath();
                vibeCtx.moveTo(a.x, a.y);
                vibeCtx.lineTo(b.x, b.y);
                vibeCtx.stroke();
            }
        }
    }

    sparks = sparks.filter(s => s.life > 0);
    for (const s of sparks) {
        s.life -= 0.018;
        s.x += s.vx;
        s.y += s.vy;
        vibeCtx.fillStyle = `rgba(255,255,255,${Math.max(0, s.life)})`;
        vibeCtx.fillRect(s.x, s.y, s.w, 2);
    }

    requestAnimationFrame(drawVibe);
}

function spawnRunes() {
    const rune = document.createElement('div');
    rune.className = 'rune';
    const tokens = ['SCHEMING','SUMMER 2026','AURA+100','AURAx0','Z-CITY'];
    rune.textContent = tokens[Math.floor(Math.random() * tokens.length)];
    rune.style.left = Math.random() * 100 + '%';
    rune.style.animationDuration = (4 + Math.random() * 5) + 's';
    rune.style.opacity = (0.35 + Math.random() * 0.5).toString();
    digitalRain.appendChild(rune);
    setTimeout(() => rune.remove(), 9500);
}

function microGlitchBurst() {
    glitchStrip.style.top = (10 + Math.random() * 80) + '%';
    glitchStrip.className = 'glitch-strip';
    void glitchStrip.offsetWidth;
    glitchStrip.classList.add('active');

    for (let i = 0; i < 18; i++) {
        sparks.push({
            x: window.innerWidth * (0.25 + Math.random() * 0.5),
            y: window.innerHeight * (0.35 + Math.random() * 0.3),
            vx: (Math.random() - 0.5) * 18,
            vy: (Math.random() - 0.5) * 5,
            w: 8 + Math.random() * 42,
            life: 0.35 + Math.random() * 0.45
        });
    }
}


const logo = document.querySelector('.logo');

function syncLogoLayers(){
    logo.setAttribute('data-text', logo.textContent);
}
syncLogoLayers();

function setMainLogo(text) {
    logo.classList.remove('logo-summer', 'logo-naplyvich');
    logo.classList.add('logo-switching');

    setTimeout(() => {
        logo.textContent = text;
        syncLogoLayers();

        if (text === 'SUMMER 2026') {
            logo.classList.add('logo-summer');
            if (summerFlare) {
                summerFlare.className = 'summer-flare';
                void summerFlare.offsetWidth;
                summerFlare.classList.add('active');
            }
            spawnLogoSparks(34, true);
        }

        if (text === 'NAPLYVICH') {
            logo.classList.add('logo-naplyvich');
            spawnLogoSparks(26, false);
        }

        microGlitchBurst();
    }, 120);

    setTimeout(() => {
        logo.classList.remove('logo-switching');
    }, 760);
}

function spawnLogoSparks(count = 24, warm = false) {
    for (let i = 0; i < count; i++) {
        sparks.push({
            x: window.innerWidth * (0.35 + Math.random() * 0.3),
            y: window.innerHeight * (0.39 + Math.random() * 0.16),
            vx: (Math.random() - 0.5) * (warm ? 24 : 18),
            vy: (Math.random() - 0.5) * (warm ? 11 : 7),
            w: warm ? 14 + Math.random() * 54 : 8 + Math.random() * 42,
            life: warm ? 0.55 + Math.random() * 0.55 : 0.35 + Math.random() * 0.45
        });
    }
}

function randomLogoSwap() {
    const r = Math.random();
    let temp = null;

    if (r > 0.94) temp = 'NAPLYVICH';
    else if (r > 0.74) temp = 'SUMMER 2026';

    if (!temp || logo.textContent !== 'SCHEMING') return;

    setMainLogo(temp);

    setTimeout(() => {
        setMainLogo('SCHEMING');
        setTimeout(() => {
            logo.classList.remove('logo-summer', 'logo-naplyvich');
        }, 150);
    }, 3600 + Math.random() * 2800);
}

setInterval(randomLogoSwap, 7600);

resizeVibeCanvas();
drawVibe();
window.addEventListener('resize', resizeVibeCanvas);
setInterval(spawnRunes, 360);
setInterval(() => {
    if (Math.random() > 0.45) microGlitchBurst();
}, 2600);

</script>

</body>
