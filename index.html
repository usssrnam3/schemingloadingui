```html
<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SCHEMING Loading</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,
body{
    width:100%;
    height:100%;
    overflow:hidden;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    background:#0a0a0a;
}

/* Текст SCHEMING */
.logo{
    position:relative;

    font-size:clamp(80px,10vw,180px);
    font-weight:900;
    font-style:italic;
    letter-spacing:10px;

    color:#ffffff;

    animation:
        logoFloat 4s ease-in-out infinite,
        glowPulse 4s ease-in-out infinite;

    text-shadow:
        0 0 5px rgba(255,255,255,.12),
        0 0 15px rgba(255,255,255,.08),
        0 0 30px rgba(255,255,255,.04);
}

.logo::after{
    content:"SCHEMING";

    position:absolute;
    inset:0;

    color:transparent;

    background:linear-gradient(
        110deg,
        transparent 0%,
        transparent 42%,
        rgba(255,255,255,.2) 47%,
        rgba(255,255,255,1) 50%,
        rgba(255,255,255,.2) 53%,
        transparent 58%,
        transparent 100%
    );

    background-size:250% 100%;
    background-position:150% center;

    -webkit-background-clip:text;
    background-clip:text;

    animation:shine 2.4s linear infinite;
}

@keyframes shine{
    from{
        background-position:150% center;
    }
    to{
        background-position:-150% center;
    }
}

@keyframes logoFloat{
    0%,100%{
        transform:scale(1);
        filter:brightness(1);
    }

    50%{
        transform:scale(1.03);
        filter:brightness(1.18);
    }
}

@keyframes glowPulse{
    0%,80%,100%{
        text-shadow:
            0 0 5px rgba(255,255,255,.12),
            0 0 15px rgba(255,255,255,.08),
            0 0 30px rgba(255,255,255,.04);
    }

    90%{
        text-shadow:
            0 0 10px rgba(255,255,255,.45),
            0 0 25px rgba(255,255,255,.35),
            0 0 55px rgba(255,255,255,.25);
    }
}

/* Loading */
.loading{
    position:absolute;
    bottom:60px;

    color:#7a7a7a;
    font-size:14px;
    font-weight:500;
    letter-spacing:6px;
    text-transform:uppercase;

    animation:pulse 2s infinite ease-in-out;
}

@keyframes pulse{
    0%,100%{
        opacity:.3;
    }

    50%{
        opacity:1;
    }
}
</style>
</head>

<body>

<div class="logo">SCHEMING</div>
<div class="loading">LOADING...</div>

<audio id="bgMusic" autoplay loop>
    <source src="sound.mp3" type="audio/mpeg">
</audio>

<script>
// LOADING...
const loading = document.querySelector('.loading');

let dots = 0;

setInterval(() => {
    dots = (dots + 1) % 4;
    loading.textContent = 'LOADING' + '.'.repeat(dots);
}, 500);

// Музыка
const music = document.getElementById('bgMusic');
music.volume = 0.20;

music.play().catch(() => {
    console.log('Autoplay blocked');
});
</script>

</body>
</html>
```
