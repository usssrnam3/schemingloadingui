<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SCHEMING Loading</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,
body{
    width:100%;
    height:100%;
    overflow:hidden;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    background:#000;
}

/* Логотип */
.logo{
    position:relative;

    font-size:clamp(80px,10vw,180px);
    font-weight:900;
    font-style:italic;
    letter-spacing:10px;

    color:#fff;

    animation:
        logoFloat 4s ease-in-out infinite,
        glowPulse 4s ease-in-out infinite;

    text-shadow:
        0 0 10px rgba(255,255,255,.15),
        0 0 25px rgba(255,255,255,.08);
}

/* Блик */
.logo::after{
    content:"";

    position:absolute;
    top:-100%;
    left:-250%;

    width:160px;
    height:300%;

    background:linear-gradient(
        90deg,
        transparent,
        rgba(255,255,255,.95),
        transparent
    );

    transform:skewX(-20deg);

    filter:blur(12px);

    mix-blend-mode:screen;
    pointer-events:none;

    animation:shine 3s linear infinite;
}

@keyframes shine{
    from{
        left:-250%;
    }

    to{
        left:250%;
    }
}

@keyframes logoFloat{
    0%,100%{
        transform:scale(1);
    }

    50%{
        transform:scale(1.02);
    }
}

@keyframes glowPulse{
    0%,80%,100%{
        text-shadow:
            0 0 10px rgba(255,255,255,.15),
            0 0 25px rgba(255,255,255,.08);
    }

    90%{
        text-shadow:
            0 0 15px rgba(255,255,255,.45),
            0 0 35px rgba(255,255,255,.25),
            0 0 70px rgba(255,255,255,.12);
    }
}

/* Loading */
.loading{
    position:absolute;
    bottom:60px;

    color:#777;
    font-size:14px;
    letter-spacing:6px;
    text-transform:uppercase;

    animation:pulse 2s infinite ease-in-out;
}

@keyframes pulse{
    0%,100%{
        opacity:.3;
    }

    50%{
        opacity:1;
    }
}
</style>
</head>

<body>

<div class="logo">SCHEMING</div>
<div class="loading">LOADING...</div>

<audio id="bgMusic" autoplay loop>
    <source src="sound.mp3" type="audio/mpeg">
</audio>

<script>
// Музыка (20%)
const music = document.getElementById('bgMusic');
music.volume = 0.20;

// LOADING...
const loading = document.querySelector('.loading');

let dots = 0;

setInterval(() => {
    dots = (dots + 1) % 4;
    loading.textContent = 'LOADING' + '.'.repeat(dots);
}, 500);
</script>

</body>
</html>
