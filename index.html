<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SCHEMING Loading</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,
body{
    width:100%;
    height:100%;
    overflow:hidden;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    background:#000;
}

.logo{
    position:relative;

    font-size:clamp(80px,10vw,180px);
    font-weight:900;
    font-style:italic;
    letter-spacing:10px;

    color:#fff;

    animation:logoGlow 4s ease-in-out infinite;

    text-shadow:
        0 0 8px rgba(255,255,255,.15),
        0 0 20px rgba(255,255,255,.08);
}

@keyframes logoGlow{
    0%,100%{
        transform:scale(1);
        text-shadow:
            0 0 8px rgba(255,255,255,.15),
            0 0 20px rgba(255,255,255,.08);
    }

    50%{
        transform:scale(1.04);
        text-shadow:
            0 0 15px rgba(255,255,255,.65),
            0 0 35px rgba(255,255,255,.45),
            0 0 80px rgba(255,255,255,.25);
    }
}

.loading{
    position:absolute;
    bottom:60px;

    color:#777;
    font-size:14px;
    letter-spacing:6px;
    text-transform:uppercase;

    animation:pulse 2s infinite ease-in-out;
}

@keyframes pulse{
    0%,100%{
        opacity:.3;
    }

    50%{
        opacity:1;
    }
}
</style>
</head>

<body>

<div class="logo">SCHEMING</div>
<div class="loading">LOADING...</div>

<audio id="bgMusic" autoplay loop>
    <source src="sound.mp3" type="audio/mpeg">
</audio>

<script>
const music = document.getElementById('bgMusic');
music.volume = 0.20;

const loading = document.querySelector('.loading');

let dots = 0;

setInterval(() => {
    dots = (dots + 1) % 4;
    loading.textContent = 'LOADING' + '.'.repeat(dots);
}, 500);
</script>

</body>
</html>
